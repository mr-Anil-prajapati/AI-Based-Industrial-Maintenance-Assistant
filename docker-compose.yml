services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: industrial-ai-maintenance-app
    ports:
      - "8000:8000"
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
    volumes:
      - .:/app
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama:latest
    container_name: industrial-ai-maintenance-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 10

volumes:
  ollama_data:
